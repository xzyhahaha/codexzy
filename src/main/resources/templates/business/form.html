<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经营录入 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="site-body business-form-page">
<div class="site-shell">
    <header class="site-masthead reveal">
        <div class="brand-block">
            <a class="brand-mark" th:href="@{/business}">BZ</a>
            <div class="brand-copy">
                <span class="section-tag">经营录入</span>
                <h1 th:text="${isInbound ? '商品入库' : '报单'}">经营录入</h1>
                <p th:text="${isInbound ? '记录自己的入库数据' : '记录一条新的报单'}">记录一条经营数据</p>
            </div>
        </div>
        <div class="section-tools">
            <a class="ghost-btn small-btn" th:href="${returnTo}">返回经营</a>
        </div>
    </header>

    <main class="content-grid reveal">
        <div class="flash-stack" style="grid-column: 1 / -1;">
            <div class="flash-banner success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="flash-banner error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        </div>

        <section class="section-card main-column">
            <div class="section-head">
                <div>
                    <span class="section-tag">当前操作</span>
                    <h3 th:text="${formTitle}">填写经营记录</h3>
                </div>
                <span class="status-pill" th:text="${isEdit ? '编辑中' : (isInbound ? '入库模式' : '报单模式')}">报单模式</span>
            </div>

            <form class="form-stack business-form" th:action="@{${formAction}}" method="post" th:object="${formDTO}"
                  th:attr="data-own-code=${businessAccount.reportCode},data-edit-mode=${isEdit}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="returnTo" th:value="${returnTo}">

                <section class="business-form-block">
                    <div class="business-form-block__head">
                        <span class="section-tag">归属</span>
                        <h4>先确定记录类型和对象</h4>
                    </div>

                    <div class="form-grid">
                    <label class="form-span-2">
                        <span>记录类型</span>
                        <div th:if="${!isEdit}">
                            <select th:field="*{recordType}">
                                <option value="REPORT">报单</option>
                                <option value="INBOUND">商品入库</option>
                            </select>
                            <div class="field-error" th:if="${#fields.hasErrors('recordType')}" th:errors="*{recordType}">类型错误</div>
                        </div>
                        <div th:if="${isEdit}" class="readonly-card">
                            <strong th:text="${recordTypeLabel}">报单</strong>
                            <input type="hidden" th:field="*{recordType}">
                        </div>
                    </label>

                    <label>
                        <span>记录状态</span>
                        <select th:field="*{recordStatus}">
                            <option value="UNINVENTORIED">未入库</option>
                            <option value="INVENTORIED_PENDING_SETTLEMENT">已入库待结算</option>
                            <option value="SETTLED">已结算</option>
                        </select>
                        <div class="field-error" th:if="${#fields.hasErrors('recordStatus')}" th:errors="*{recordStatus}">状态错误</div>
                    </label>

                    <label class="form-span-2" th:if="${!isInbound && !isEdit}">
                        <span>已绑定账号</span>
                        <select data-bound-target-select th:disabled="${#lists.isEmpty(boundTargets)}">
                            <option value="">手动输入或选择已绑定账号</option>
                            <option th:each="item : ${boundTargets}"
                                    th:value="${item.targetReportCode}"
                                    th:selected="${item.targetReportCode == formDTO.targetReportCode}"
                                    th:text="|${item.targetDisplayName} · ${item.targetReportCode}|">张三 · CZ00000000</option>
                        </select>
                        <small class="field-hint"
                               th:text="${#lists.isEmpty(boundTargets) ? '当前还没有已绑定账号。' : '选择后会自动填入目标报码。'}">
                            当前还没有已绑定账号。
                        </small>
                    </label>

                    <label class="form-span-2">
                        <span>目标报单码</span>
                        <input type="text" th:field="*{targetReportCode}" th:readonly="${isInbound || isEdit}" placeholder="输入对方的报单码">
                        <small class="field-hint" th:text="${isEdit ? '编辑时目标报码保持不变。' : (isInbound ? '入库模式会自动归到你自己名下。' : '可手动输入。')}">提示</small>
                        <div class="field-error" th:if="${#fields.hasErrors('targetReportCode')}" th:errors="*{targetReportCode}">报码错误</div>
                    </label>

                    <label class="checkbox-inline form-span-2" th:if="${!isInbound && !isEdit}">
                        <input type="checkbox" th:field="*{bindTarget}">
                        <span>把这次目标保存为常用账号，下次报单时可直接选择</span>
                    </label>
                    </div>
                </section>

                <section class="business-form-block">
                    <div class="business-form-block__head">
                        <span class="section-tag">基础信息</span>
                        <h4>再填写时间、产品和数量</h4>
                    </div>

                    <div class="form-grid">
                    <label>
                        <span>发生时间</span>
                        <input type="datetime-local" th:field="*{occurredAt}">
                        <div class="field-error" th:if="${#fields.hasErrors('occurredAt')}" th:errors="*{occurredAt}">时间错误</div>
                    </label>

                    <label>
                        <span>产品名称</span>
                        <input type="text" th:field="*{productName}" placeholder="输入产品名称">
                        <div class="field-error" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}">产品错误</div>
                    </label>

                    <label>
                        <span>数量</span>
                        <input type="number" th:field="*{quantity}" min="1" step="1" placeholder="0">
                        <div class="field-error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}">数量错误</div>
                    </label>
                    </div>
                </section>

                <section class="business-form-block">
                    <div class="business-form-block__head">
                        <span class="section-tag">金额信息</span>
                        <h4>补齐成本、固返、利润和卖出</h4>
                    </div>

                    <div class="form-grid">
                    <label>
                        <span>成本</span>
                        <input type="number" th:field="*{costAmount}" min="0" step="0.01" placeholder="0.00">
                        <div class="field-error" th:if="${#fields.hasErrors('costAmount')}" th:errors="*{costAmount}">成本错误</div>
                    </label>

                    <label>
                        <span>固返</span>
                        <input type="number" th:field="*{fixedReturnAmount}" min="0" step="0.01" placeholder="0.00">
                        <div class="field-error" th:if="${#fields.hasErrors('fixedReturnAmount')}" th:errors="*{fixedReturnAmount}">固返错误</div>
                    </label>

                    <label>
                        <span>利润</span>
                        <input type="number" th:field="*{profitAmount}" min="0" step="0.01" placeholder="0.00">
                        <div class="field-error" th:if="${#fields.hasErrors('profitAmount')}" th:errors="*{profitAmount}">利润错误</div>
                    </label>

                    <label>
                        <span>卖出金额</span>
                        <input type="number" th:field="*{soldAmount}" min="0" step="0.01" placeholder="0.00">
                        <div class="field-error" th:if="${#fields.hasErrors('soldAmount')}" th:errors="*{soldAmount}">卖出金额错误</div>
                    </label>
                    </div>
                </section>

                <section class="business-form-block">
                    <div class="business-form-block__head">
                        <span class="section-tag">备注</span>
                        <h4>最后补充客户信息或说明</h4>
                    </div>

                    <div class="form-grid">
                    <label class="form-span-2">
                        <span>备注</span>
                        <textarea th:field="*{remark}" placeholder="补充一些经营说明、客户信息或额外备注"></textarea>
                        <div class="field-error" th:if="${#fields.hasErrors('remark')}" th:errors="*{remark}">备注错误</div>
                    </label>
                    </div>
                </section>

                <div class="form-actions-row">
                    <button type="submit" class="solid-btn" th:text="${submitLabel}">保存记录</button>
                    <a class="ghost-btn" th:href="${returnTo}">返回经营</a>
                </div>
            </form>
        </section>

        <aside class="section-card side-tone business-form-side">
            <div class="business-form-side__stack">
                <article class="readonly-card">
                    <span class="meta-note">当前模式</span>
                    <strong th:text="${isEdit ? recordTypeLabel : (isInbound ? '商品入库' : '报单')}">报单</strong>
                    <p th:text="${isEdit ? '当前在编辑已有记录。' : (isInbound ? '默认归到自己名下。' : '默认记录到目标报码名下。')}">当前模式说明</p>
                </article>

                <article class="readonly-card">
                    <span class="meta-note">返回路径</span>
                    <strong th:text="${#strings.startsWith(returnTo, '/business/reporters/') ? '报单详情' : '经营页面'}">经营页面</strong>
                    <p th:text="${#strings.startsWith(returnTo, '/business/reporters/') ? '保存后回到当前报单人的记录页。' : '保存后回到当前经营页。'}">保存后回到当前经营页。</p>
                </article>
            </div>
        </aside>

    </main>
</div>
<div th:replace="~{fragments/mobile-tabbar :: mobileTabbar(activeTab='business')}"></div>
<script th:src="@{/js/business-form.js}"></script>
</body>
</html>
