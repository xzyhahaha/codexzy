<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<nav class="module-tabbar" th:fragment="mobileTabbar(activeTab)" aria-label="底部模块导航">
    <div class="module-tabbar__shell">
        <a class="module-tabbar__item" th:classappend="${activeTab == 'home'} ? ' is-active' : ''" th:href="@{/}">
            <span class="module-tabbar__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4 11.5 12 5l8 6.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6.5 10.5V19h11v-8.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            <span class="module-tabbar__label">首页</span>
        </a>
        <a class="module-tabbar__item" th:classappend="${activeTab == 'business'} ? ' is-active' : ''" th:href="@{/business}">
            <span class="module-tabbar__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M5 19V11" stroke-linecap="round"/>
                    <path d="M12 19V6" stroke-linecap="round"/>
                    <path d="M19 19v-8" stroke-linecap="round"/>
                    <path d="M4 19h16" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="module-tabbar__label">经营</span>
        </a>
        <a class="module-tabbar__item" th:classappend="${activeTab == 'checkin'} ? ' is-active' : ''" th:href="@{/checkin}">
            <span class="module-tabbar__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <rect x="4" y="6" width="16" height="14" rx="3" stroke-linejoin="round"/>
                    <path d="M8 4v4M16 4v4M4 10h16" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="module-tabbar__label">打卡</span>
        </a>
        <a class="module-tabbar__item" th:classappend="${activeTab == 'memo'} ? ' is-active' : ''" th:href="@{/memo}">
            <span class="module-tabbar__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4 8V6.5A2.5 2.5 0 0 1 6.5 4H10l2 2h5.5A2.5 2.5 0 0 1 20 8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 8.5h16v9A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5z" stroke-linejoin="round"/>
                </svg>
            </span>
            <span class="module-tabbar__label">资料</span>
        </a>
        <a class="module-tabbar__item" th:classappend="${activeTab == 'profile'} ? ' is-active' : ''" th:href="@{/user/profile}">
            <span class="module-tabbar__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="8.2" r="3.2"/>
                    <path d="M5 19c1.8-3.2 4.2-4.8 7-4.8S17.2 15.8 19 19" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="module-tabbar__label">我的</span>
        </a>
    </div>
</nav>
</body>
</html>
