<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡月历 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="site-body checkin-page">
<div class="site-shell">
    <header class="site-masthead reveal">
        <div class="brand-block">
            <a class="brand-mark" th:href="@{/}">CZ</a>
            <div class="brand-copy">
                <span class="section-tag">月历</span>
                <h1>打卡月历</h1>
                <p th:text="|${currentLabel} · ${stats.currentMonthCount} 次|">2026年4月 · 0 次</p>
            </div>
        </div>
    </header>

    <main class="page-stack">
        <section class="content-grid reveal">
            <article class="section-card main-column">
                <div class="section-head">
                    <div>
                        <span class="section-tag">月历</span>
                        <h3>按天查看记录</h3>
                    </div>
                    <div class="section-tools">
                        <a class="ghost-btn small-btn" th:href="@{/checkin}">打卡列表</a>
                        <a class="ghost-btn small-btn" th:href="@{'/checkin/calendar?year=' + ${prev.year} + '&month=' + ${prev.monthValue}}">上个月</a>
                        <a class="ghost-btn small-btn" th:href="@{'/checkin/calendar?year=' + ${next.year} + '&month=' + ${next.monthValue}}">下个月</a>
                    </div>
                </div>

                <div class="calendar-week">
                    <span>一</span>
                    <span>二</span>
                    <span>三</span>
                    <span>四</span>
                    <span>五</span>
                    <span>六</span>
                    <span>日</span>
                </div>

                <div class="calendar-board">
                    <a th:each="day : ${calendarDays}"
                       th:href="@{'/checkin/day?date=' + ${#temporals.format(day.date, 'yyyy-MM-dd')}}"
                       class="calendar-card"
                       th:classappend="(${day.currentMonth} ? '' : ' is-muted') + (${day.checkedIn} ? ' is-active' : '') + (${day.today} ? ' is-today' : '')">
                        <div class="calendar-card-top">
                            <span class="calendar-day-number" th:text="${day.dayOfMonth}">1</span>
                            <span class="calendar-count" th:text="${day.recordCount > 0 ? day.recordCount + ' 条' : '空白'}">空白</span>
                        </div>
                        <div class="calendar-card-body">
                            <strong th:text="${day.primaryTitle != null && !day.primaryTitle.isEmpty() ? day.primaryTitle : '当天暂无记录'}">当天暂无记录</strong>
                            <span class="calendar-link-hint" th:text="${day.checkedIn} ? '查看记录' : '补充记录'">查看记录</span>
                        </div>
                    </a>
                </div>
            </article>
        </section>

        <section class="metric-grid reveal">
            <article class="metric-card metric-card--compact">
                <span class="meta-note">累计</span>
                <strong class="metric-number" th:text="${stats.totalCheckInDays}">0</strong>
            </article>
            <article class="metric-card metric-card--compact tone-warm">
                <span class="meta-note">连续</span>
                <strong class="metric-number" th:text="${stats.currentStreakDays}">0</strong>
            </article>
            <article class="metric-card metric-card--compact tone-soft">
                <span class="meta-note">本月</span>
                <strong class="metric-number" th:text="${stats.currentMonthCount}">0</strong>
            </article>
        </section>
    </main>
</div>
<div th:replace="~{fragments/mobile-tabbar :: mobileTabbar(activeTab='checkin')}"></div>
</body>
</html>
