<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日期详情 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="site-body checkin-page">
<div class="site-shell">
    <header class="site-masthead reveal">
        <div class="brand-block">
            <a class="brand-mark" th:href="@{/}">CZ</a>
            <div class="brand-copy">
                <span class="section-tag">日期详情</span>
                <h1 th:text="${selectedDateLabel}">2026年4月2日</h1>
                <p th:text="|当天 ${records.size()} 条 · 本月 ${stats.currentMonthCount} 次|">当天 0 条 · 本月 0 次</p>
            </div>
        </div>
    </header>

    <main class="page-stack">
        <section class="content-grid reveal"
                 th:with="returnTo=@{/checkin/day(date=${#temporals.format(selectedDate, 'yyyy-MM-dd')})}">
            <article class="section-card main-column">
                <div class="section-head">
                    <div>
                        <span class="section-tag">当天记录</span>
                        <h3>这一天的内容</h3>
                    </div>
                    <div class="section-tools">
                        <a class="ghost-btn small-btn" th:href="@{/checkin/calendar}">返回月历</a>
                        <a class="ghost-btn small-btn" th:href="@{'/checkin/day?date=' + ${#temporals.format(previousDate, 'yyyy-MM-dd')}}">前一天</a>
                        <a class="ghost-btn small-btn" th:if="${allowNextDate}" th:href="@{'/checkin/day?date=' + ${#temporals.format(nextDate, 'yyyy-MM-dd')}}">后一天</a>
                        <a class="solid-btn small-btn"
                           th:href="@{/checkin/form(date=${#temporals.format(selectedDate, 'yyyy-MM-dd')}, returnTo=${returnTo})}">补一条当天记录</a>
                    </div>
                </div>

                <div class="empty-panel" th:if="${records.isEmpty()}">
                    <h4>这一天还没有记录</h4>
                    <a class="solid-btn"
                       th:href="@{/checkin/form(date=${#temporals.format(selectedDate, 'yyyy-MM-dd')}, returnTo=${returnTo})}">现在补卡</a>
                </div>

                <div class="entry-list" th:if="${!records.isEmpty()}">
                    <article class="entry-card" th:each="item : ${records}">
                        <div class="entry-stamp large-stamp">
                            <span th:text="${#temporals.format(item.checkDate, 'MM-dd')}">04-02</span>
                            <small th:text="${#temporals.format(item.updateTime, 'HH:mm 更新')}">12:00 更新</small>
                        </div>
                        <div class="entry-body">
                            <div class="entry-head">
                                <h4 th:text="${item.title}">标题</h4>
                                <div class="entry-actions">
                                    <a class="ghost-btn small-btn" th:href="@{/checkin/{id}/edit(id=${item.id}, returnTo=${returnTo})}">编辑</a>
                                </div>
                            </div>
                            <p th:text="${#strings.isEmpty(item.content) ? '这条记录没有填写详细内容。' : item.content}">内容</p>
                        </div>
                    </article>
                </div>
            </article>

        </section>

        <section class="metric-grid reveal">
            <article class="metric-card metric-card--compact">
                <span class="meta-note">当天</span>
                <strong class="metric-number" th:text="${records.size()}">0</strong>
            </article>
            <article class="metric-card metric-card--compact tone-warm">
                <span class="meta-note">连续</span>
                <strong class="metric-number" th:text="${stats.currentStreakDays}">0</strong>
            </article>
            <article class="metric-card metric-card--compact tone-soft">
                <span class="meta-note">本月</span>
                <strong class="metric-number" th:text="${stats.currentMonthCount}">0</strong>
            </article>
        </section>
    </main>
</div>
<div th:replace="~{fragments/mobile-tabbar :: mobileTabbar(activeTab='checkin')}"></div>
</body>
</html>
