<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建打卡 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<header class="topbar">
    <div>
        <h1>新建打卡</h1>
        <p>当前版本先支持标题和内容，附件会在下一阶段接入</p>
    </div>
    <nav class="nav-actions">
        <a th:href="@{/checkin}">返回列表</a>
    </nav>
</header>

<main class="page-grid">
    <section class="panel">
        <form th:action="@{/checkin}" th:object="${formDTO}" method="post" class="form-grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label>
                <span>标题</span>
                <input type="text" th:field="*{title}" placeholder="例如：完成今日算法练习">
                <small class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
            </label>

            <label>
                <span>内容</span>
                <textarea th:field="*{content}" rows="8" placeholder="记录今天做了什么、遇到了什么问题"></textarea>
                <small class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></small>
            </label>

            <button type="submit" class="primary-btn">保存打卡</button>
        </form>
    </section>
</main>
</body>
</html>
