<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' - codexzy'">新建打卡 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="site-body checkin-page checkin-form-page">
<div class="site-shell">
    <header class="site-masthead reveal">
        <div class="brand-block">
            <a class="brand-mark" th:href="@{/}">CZ</a>
            <div class="brand-copy">
                <h1 th:text="${formTitle}">新建打卡</h1>
            </div>
        </div>
        <div class="section-tools">
            <a class="ghost-btn small-btn" th:href="${returnTo}">返回打卡</a>
        </div>
    </header>

    <main class="page-stack">
        <section class="content-grid reveal">
            <article class="section-card main-column">
                <div class="section-head">
                    <div>
                        <h3 th:text="${isEdit} ? '编辑' : '新建'">新建</h3>
                    </div>
                    <span class="status-pill" th:text="${isEdit ? '编辑中' : '待保存'}">待保存</span>
                </div>

                <form th:action="${formAction}" th:object="${formDTO}" method="post" class="form-stack">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="returnTo" th:value="${returnTo}">

                    <section class="business-form-block">
                        <div class="business-form-block__head">
                            <h4>基础信息</h4>
                        </div>

                        <div class="form-grid">
                            <label>
                                <span>标题</span>
                                <input type="text" th:field="*{title}" placeholder="例如：完成接口联调 / 看完两章算法题">
                                <small class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
                            </label>

                            <label>
                                <span>打卡日期</span>
                                <input type="date" th:field="*{checkDate}" th:attr="max=${maxDate}">
                                <small class="field-error" th:if="${#fields.hasErrors('checkDate')}" th:errors="*{checkDate}"></small>
                            </label>
                        </div>
                    </section>

                    <section class="business-form-block">
                        <div class="business-form-block__head">
                            <h4>内容</h4>
                        </div>

                        <div class="form-grid">
                            <label class="form-span-2">
                                <span>内容</span>
                                <textarea th:field="*{content}" rows="9" placeholder="写下今天完成了什么、推进到了哪一步、遇到了什么问题以及怎么处理。"></textarea>
                                <small class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></small>
                            </label>
                        </div>
                    </section>

                    <div class="form-actions-row">
                        <button type="submit" class="solid-btn" th:text="${submitLabel}">保存打卡</button>
                        <a class="inline-link" th:href="${returnTo}">返回打卡</a>
                    </div>
                </form>
            </article>

            <aside class="section-card side-tone business-form-side">
                <div class="business-form-side__stack">
                    <article class="readonly-card">
                        <strong th:text="${isEdit ? '编辑打卡' : '新建打卡'}">新建打卡</strong>
                    </article>

                    <article class="readonly-card">
                        <strong th:text="${#strings.startsWith(returnTo, '/checkin/day') ? '当天记录' : '打卡列表'}">打卡列表</strong>
                        <a class="ghost-btn small-btn" th:href="${returnTo}">直接返回</a>
                    </article>
                </div>
            </aside>
        </section>
    </main>
</div>
<div th:replace="~{fragments/mobile-tabbar :: mobileTabbar(activeTab='checkin')}"></div>
</body>
</html>
