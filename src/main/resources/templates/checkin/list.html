<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡列表 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<header class="topbar">
    <div>
        <h1>打卡列表</h1>
        <p>记录你每天的学习、训练或工作进展</p>
    </div>
    <nav class="nav-actions">
        <a th:href="@{/}">返回首页</a>
        <a th:href="@{/checkin/form}" class="primary-btn">新建打卡</a>
    </nav>
</header>

<main class="page-grid">
    <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="panel">
        <div class="empty-state" th:if="${pageData.records.isEmpty()}">
            <h2>还没有打卡记录</h2>
            <p>先创建第一条记录，首页统计就会开始累计。</p>
        </div>

        <div class="record-list" th:if="${!pageData.records.isEmpty()}">
            <article class="record-card" th:each="item : ${pageData.records}">
                <div class="record-main">
                    <h3 th:text="${item.title}">标题</h3>
                    <p class="record-date" th:text="${#temporals.format(item.checkDate, 'yyyy-MM-dd')}">2026-04-02</p>
                    <p class="record-content" th:text="${item.content} ?: '暂无内容'">内容</p>
                </div>
                <form th:action="@{'/checkin/' + ${item.id} + '/delete'}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="danger-btn" onclick="return confirm('确认删除这条打卡记录吗？')">删除</button>
                </form>
            </article>
        </div>
    </section>

    <section class="panel pager" th:if="${pageData.pages > 1}">
        <a th:if="${pageData.current > 1}" th:href="@{'/checkin?page=' + ${pageData.current - 1}}">上一页</a>
        <span th:text="'第 ' + ${pageData.current} + ' / ' + ${pageData.pages} + ' 页'"></span>
        <a th:if="${pageData.current < pageData.pages}" th:href="@{'/checkin?page=' + ${pageData.current + 1}}">下一页</a>
    </section>
</main>
</body>
</html>
