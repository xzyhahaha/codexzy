<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡记录 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="site-body checkin-page">
<div class="site-shell">
    <header class="site-masthead reveal">
        <div class="brand-block">
            <a class="brand-mark" th:href="@{/}">CZ</a>
            <div class="brand-copy">
                <span class="section-tag">打卡记录</span>
                <h1>打卡记录</h1>
                <p th:text="|共 ${pageData.total} 条 · 第 ${pageData.current} / ${pageData.pages == 0 ? 1 : pageData.pages} 页|">共 0 条 · 第 1 / 1 页</p>
            </div>
        </div>
    </header>

    <main class="page-stack">
        <div class="flash-stack reveal">
            <div class="flash-banner success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="flash-banner error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        </div>

        <section class="content-grid reveal" th:with="returnTo=@{/checkin(page=${pageData.current})}">
            <article class="section-card main-column">
                <div class="section-head">
                    <div>
                        <span class="section-tag">记录</span>
                        <h3>按时间倒序</h3>
                    </div>
                    <div class="section-tools">
                        <a class="ghost-btn small-btn" th:href="@{/checkin/calendar}">月历</a>
                        <a class="solid-btn small-btn" th:href="@{/checkin/form(returnTo=${returnTo})}">新建打卡</a>
                    </div>
                </div>

                <div class="empty-panel" th:if="${pageData.records.isEmpty()}">
                    <h4>还没有打卡内容</h4>
                    <a class="solid-btn" th:href="@{/checkin/form(returnTo=${returnTo})}">去写第一条</a>
                </div>

                <div class="entry-list" th:if="${!pageData.records.isEmpty()}">
                    <article class="entry-card" th:each="item : ${pageData.records}">
                        <div class="entry-stamp large-stamp">
                            <span th:text="${#temporals.format(item.checkDate, 'MM-dd')}">04-02</span>
                            <small th:text="${#temporals.format(item.checkDate, 'yyyy / E')}">2026 / 周四</small>
                        </div>
                        <div class="entry-body">
                            <div class="entry-head">
                                <h4 th:text="${item.title}">标题</h4>
                                <div class="entry-actions">
                                    <a class="ghost-btn small-btn" th:href="@{/checkin/{id}/edit(id=${item.id}, returnTo=${returnTo})}">编辑</a>
                                    <form th:action="@{'/checkin/' + ${item.id} + '/delete'}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="returnTo" th:value="${returnTo}">
                                        <button type="submit" class="danger-btn small-btn" onclick="return confirm('确认删除这条打卡记录吗？')">删除</button>
                                    </form>
                                </div>
                            </div>
                            <p th:text="${#strings.isEmpty(item.content) ? '这条记录没有填写详细内容。' : item.content}">内容</p>
                            <div class="entry-meta">
                                <span class="status-pill" th:text="${#temporals.format(item.updateTime, 'yyyy-MM-dd HH:mm')} + ' 更新'">2026-04-02 12:00 更新</span>
                            </div>
                        </div>
                    </article>
                </div>
            </article>

        </section>

        <section class="metric-grid reveal">
            <article class="metric-card metric-card--compact">
                <span class="meta-note">累计</span>
                <strong class="metric-number" th:text="${stats.totalCheckInDays}">0</strong>
            </article>
            <article class="metric-card metric-card--compact tone-warm">
                <span class="meta-note">连续</span>
                <strong class="metric-number" th:text="${stats.currentStreakDays}">0</strong>
            </article>
            <article class="metric-card metric-card--compact tone-soft">
                <span class="meta-note">本月</span>
                <strong class="metric-number" th:text="${stats.currentMonthCount}">0</strong>
            </article>
        </section>

        <section class="pager-bar reveal" th:if="${pageData.pages > 1}">
            <a class="ghost-btn small-btn" th:if="${pageData.current > 1}" th:href="@{'/checkin?page=' + ${pageData.current - 1}}">上一页</a>
            <span class="status-pill" th:text="|第 ${pageData.current} / ${pageData.pages} 页|">第 1 / 1 页</span>
            <a class="ghost-btn small-btn" th:if="${pageData.current < pageData.pages}" th:href="@{'/checkin?page=' + ${pageData.current + 1}}">下一页</a>
        </section>
    </main>
</div>
<div th:replace="~{fragments/mobile-tabbar :: mobileTabbar(activeTab='checkin')}"></div>
</body>
</html>
