<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的设置 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="site-body profile-page">
<div class="site-shell">
    <header class="site-masthead reveal">
        <div class="brand-block">
            <a class="brand-mark" th:href="@{/}">CZ</a>
            <div class="brand-copy">
                <h1>我的设置</h1>
            </div>
        </div>
    </header>

    <main class="page-stack">
        <div class="flash-stack reveal">
            <div class="flash-banner success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="flash-banner error" th:if="${passwordErrorMessage}" th:text="${passwordErrorMessage}"></div>
        </div>

        <section class="content-grid reveal">
            <article class="section-card main-column profile-main-card">
                <div class="section-head">
                    <div>
                        <h3>资料</h3>
                    </div>
                    <span class="status-pill" th:text="${currentUser.username}">username</span>
                </div>

                <form th:action="@{/user/profile}" th:object="${profileDTO}" method="post" class="form-stack">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <label>
                        <span>昵称</span>
                        <input type="text" th:field="*{nickname}" placeholder="显示在首页和资料页">
                        <small class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></small>
                    </label>

                    <label>
                        <span>邮箱</span>
                        <input type="email" th:field="*{email}" placeholder="name@example.com">
                        <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                    </label>

                    <button type="submit" class="solid-btn">保存资料</button>
                </form>

                <div class="profile-account-panel">
                    <div class="section-head profile-account-head">
                        <div>
                            <h3>账号</h3>
                        </div>
                    </div>

                    <div class="profile-account-list">
                        <article>
                            <strong>用户名</strong>
                            <p th:text="${currentUser.username}">username</p>
                        </article>
                        <article>
                            <strong>昵称</strong>
                            <p th:text="${#strings.isEmpty(currentUser.nickname) ? '尚未设置昵称' : currentUser.nickname}">昵称</p>
                        </article>
                        <article>
                            <strong>注册时间</strong>
                            <p th:text="${#temporals.format(currentUser.createTime, 'yyyy-MM-dd HH:mm')}">2026-04-02 10:00</p>
                        </article>
                    </div>

                    <div class="code-panel profile-code-panel">
                        <div class="code-copy-row">
                            <strong class="code-value" th:text="${businessAccount.reportCode}">CZ00000000</strong>
                            <button type="button"
                                    class="ghost-btn small-btn code-copy-btn"
                                    th:attr="data-copy-text=${businessAccount.reportCode},data-copy-label='复制个人报码',data-copied-label='已复制',data-copy-error-label='复制失败'"
                                    aria-label="复制个人报码">复制</button>
                        </div>
                    </div>

                    <div class="account-action-panel profile-account-actions">
                        <form th:action="@{/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="ghost-btn">退出登录</button>
                        </form>
                    </div>

                    <section class="profile-subsection">
                        <div class="section-head profile-account-head">
                            <div>
                                <h3>密码</h3>
                            </div>
                        </div>

                        <form th:action="@{/user/password}" th:object="${passwordDTO}" method="post" class="form-stack">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="form-grid">
                                <label>
                                    <span>当前密码</span>
                                    <input type="password" th:field="*{oldPassword}" placeholder="请输入当前密码">
                                    <small class="field-error" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></small>
                                </label>

                                <label>
                                    <span>新密码</span>
                                    <input type="password" th:field="*{newPassword}" placeholder="至少 6 位">
                                    <small class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></small>
                                </label>
                            </div>

                            <div class="form-actions-row">
                                <button type="submit" class="solid-btn">更新密码</button>
                            </div>
                        </form>
                    </section>
                </div>
            </article>
        </section>
    </main>
</div>
<div th:replace="~{fragments/mobile-tabbar :: mobileTabbar(activeTab='profile')}"></div>
<script th:src="@{/js/code-copy.js}"></script>
</body>
</html>
