<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人设置 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<header class="topbar">
    <div>
        <h1>个人设置</h1>
        <p>维护你的基础信息和登录密码</p>
    </div>
    <nav class="nav-actions">
        <a th:href="@{/}">返回首页</a>
    </nav>
</header>

<main class="page-grid">
    <section class="panel">
        <h2>基础信息</h2>
        <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <form th:action="@{/user/profile}" th:object="${profileDTO}" method="post" class="form-grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label>
                <span>用户名</span>
                <input type="text" th:value="${currentUser.username}" disabled>
            </label>

            <label>
                <span>昵称</span>
                <input type="text" th:field="*{nickname}">
                <small class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></small>
            </label>

            <label>
                <span>邮箱</span>
                <input type="email" th:field="*{email}">
                <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </label>

            <button type="submit" class="primary-btn">保存信息</button>
        </form>
    </section>

    <section class="panel">
        <h2>修改密码</h2>
        <div class="alert error" th:if="${passwordErrorMessage}" th:text="${passwordErrorMessage}"></div>

        <form th:action="@{/user/password}" th:object="${passwordDTO}" method="post" class="form-grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label>
                <span>旧密码</span>
                <input type="password" th:field="*{oldPassword}">
                <small class="field-error" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></small>
            </label>

            <label>
                <span>新密码</span>
                <input type="password" th:field="*{newPassword}">
                <small class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></small>
            </label>

            <button type="submit" class="primary-btn">更新密码</button>
        </form>
    </section>
</main>
</body>
</html>
