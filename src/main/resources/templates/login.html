<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page login-page">
<div class="auth-layout">
    <section class="auth-story reveal">
        <div class="story-topline">
            <span class="brand-ribbon">codexzy</span>
        </div>
        <h1>把日常记录放在同一个地方。</h1>
        <p>登录后直接进入经营、打卡和资料。</p>
    </section>

    <section class="auth-panel reveal">
        <div class="auth-panel-header">
            <span class="section-tag">账号登录</span>
            <h2>欢迎回来</h2>
        </div>

        <div class="flash-stack">
            <div class="flash-banner success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="flash-banner error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <div class="flash-banner error" th:if="${param.error}">用户名或密码错误，请重新输入。</div>
            <div class="flash-banner success" th:if="${param.logout}">你已安全退出。</div>
        </div>

        <form th:action="@{/login}" method="post" class="form-stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label>
                <span>用户名</span>
                <input type="text" name="username" placeholder="请输入用户名" required>
            </label>

            <label>
                <span>密码</span>
                <input type="password" name="password" placeholder="请输入密码" required>
            </label>

            <label class="checkbox-inline">
                <input type="checkbox" name="remember-me">
                <span>记住我</span>
            </label>

            <button type="submit" class="solid-btn wide-btn">登录</button>
        </form>

        <p class="form-footer">还没有账号？<a th:href="@{/register}">立即注册</a></p>
    </section>
</div>
</body>
</html>
