<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<header class="topbar">
    <div>
        <h1>codexzy</h1>
        <p th:text="'你好，' + ${currentUser.nickname} + '。今天也继续保持节奏。'"></p>
    </div>
    <nav class="nav-actions">
        <a th:href="@{/checkin}">打卡</a>
        <a th:href="@{/memo}">备忘录</a>
        <a th:href="@{/user/profile}">个人设置</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="link-btn">退出</button>
        </form>
    </nav>
</header>

<main class="dashboard">
    <section class="hero-panel">
        <h2>你的记录工作台</h2>
        <p>这里集中展示打卡进度、资料数量和常用入口，适合作为日常使用的默认首页。</p>
    </section>

    <section class="stats-grid">
        <article class="stat-card">
            <span>总打卡天数</span>
            <strong th:text="${stats.totalCheckInDays}">0</strong>
        </article>
        <article class="stat-card">
            <span>当前连续打卡</span>
            <strong th:text="${stats.currentStreakDays}">0</strong>
        </article>
        <article class="stat-card">
            <span>本月打卡次数</span>
            <strong th:text="${stats.currentMonthCount}">0</strong>
        </article>
        <article class="stat-card">
            <span>备忘录文件数</span>
            <strong th:text="${memoFileCount}">0</strong>
        </article>
    </section>

    <section class="quick-links">
        <a class="feature-card" th:href="@{/checkin}">
            <h3>打卡模块</h3>
            <p>支持新增、列表、删除和月历查看，适合每天沉淀学习或工作记录。</p>
        </a>
        <a class="feature-card" th:href="@{/memo}">
            <h3>备忘录模块</h3>
            <p>支持分类、上传、下载和删除文件，用来整理资料、证书和项目附件。</p>
        </a>
    </section>
</main>
</body>
</html>
