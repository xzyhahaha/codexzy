<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-body">
<header class="topbar">
    <div>
        <h1>codexzy</h1>
        <p th:text="'你好，' + ${currentUser.nickname} + '。今天也继续保持节奏。'"></p>
    </div>
    <nav class="nav-actions">
        <a th:href="@{/checkin}">打卡</a>
        <a th:href="@{/memo}">备忘录</a>
        <a th:href="@{/user/profile}">个人设置</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="link-btn">退出</button>
        </form>
    </nav>
</header>

<main class="dashboard">
    <section class="hero-panel">
        <h2>本阶段已完成用户认证与基础面板</h2>
        <p>后续可以继续在此基础上接入打卡列表、日历视图、附件管理和备忘录文件管理。</p>
    </section>

    <section class="stats-grid">
        <article class="stat-card">
            <span>总打卡天数</span>
            <strong th:text="${stats.totalCheckInDays}">0</strong>
        </article>
        <article class="stat-card">
            <span>当前连续打卡</span>
            <strong th:text="${stats.currentStreakDays}">0</strong>
        </article>
        <article class="stat-card">
            <span>本月打卡次数</span>
            <strong th:text="${stats.currentMonthCount}">0</strong>
        </article>
        <article class="stat-card">
            <span>备忘录文件数</span>
            <strong th:text="${memoFileCount}">0</strong>
        </article>
    </section>

    <section class="quick-links">
        <a class="feature-card" th:href="@{/checkin}">
            <h3>打卡模块</h3>
            <p>当前已支持打卡列表、新建和删除，下一步继续接日历和附件上传。</p>
        </a>
        <a class="feature-card" th:href="@{/memo}">
            <h3>备忘录模块</h3>
            <p>进入文件与分类管理占位页，下一步接上传、下载和删除逻辑。</p>
        </a>
    </section>
</main>
</body>
</html>
