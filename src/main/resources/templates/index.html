<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="site-body">
<div class="site-shell">
    <header class="site-masthead reveal">
        <div class="brand-block">
            <a class="brand-mark" th:href="@{/}">CZ</a>
            <div class="brand-copy">
                <span class="section-tag">开始使用</span>
                <h1>codexzy</h1>
                <p th:text="|${todayLabel} · 从常用页面开始|">2026年4月2日 星期四</p>
            </div>
        </div>
    </header>

    <main class="page-stack">
        <section class="hero-banner landing-hero reveal">
            <div class="hero-copy">
                <span class="section-tag">今日入口</span>
                <h2>
                    <span th:text="${#strings.isEmpty(currentUser.nickname) ? currentUser.username : currentUser.nickname}">用户</span>
                    <br>
                    先打开常用模块。
                </h2>
                <p th:text="${todayLabel}">2026年4月2日 星期四</p>
                <div class="hero-actions">
                    <a class="solid-btn" th:href="@{/business}">进入经营</a>
                    <a class="ghost-btn" th:href="@{/checkin}">进入打卡</a>
                </div>
            </div>
            <div class="hero-panel-grid">
                <article class="insight-card">
                    <span class="meta-note">当前账号</span>
                    <strong th:text="${#strings.isEmpty(currentUser.nickname) ? currentUser.username : currentUser.nickname}">用户</strong>
                    <p th:text="|用户名：${currentUser.username}|">用户名</p>
                </article>
                <article class="insight-card">
                    <span class="meta-note">打卡进度</span>
                    <strong th:text="${stats.currentMonthCount}">0</strong>
                    <p>本月打卡</p>
                </article>
            </div>
        </section>

        <section class="home-module-grid reveal">
            <a class="home-module-card home-module-card--primary module-tone-business" th:href="@{/business}">
                <div class="home-module-card__head">
                    <span class="section-tag">经营</span>
                    <h3>报单 / 入库</h3>
                </div>
                <div class="home-module-card__tips">
                    <span>报单</span>
                    <span>入库</span>
                    <span>汇总</span>
                </div>
                <div class="home-module-card__footer">
                    <span class="choice-meta">经营记录</span>
                    <span class="choice-cta">进入</span>
                </div>
            </a>

            <a class="home-module-card home-module-card--primary module-tone-checkin" th:href="@{/checkin}">
                <div class="home-module-card__head">
                    <span class="section-tag">打卡</span>
                    <h3>打卡 / 月历</h3>
                </div>
                <div class="home-module-card__metrics">
                    <article>
                        <strong th:text="${stats.totalCheckInDays}">0</strong>
                        <span>累计天数</span>
                    </article>
                    <article>
                        <strong th:text="${stats.currentStreakDays}">0</strong>
                        <span>连续打卡</span>
                    </article>
                    <article>
                        <strong th:text="${stats.currentMonthCount}">0</strong>
                        <span>本月次数</span>
                    </article>
                </div>
                <div class="home-module-card__footer">
                    <span class="choice-meta">打卡记录</span>
                    <span class="choice-cta">进入</span>
                </div>
            </a>

            <a class="home-module-card home-module-card--secondary module-tone-memo" th:href="@{/memo}">
                <div class="home-module-card__head">
                    <span class="section-tag">资料</span>
                    <h3>资料 / 文件</h3>
                </div>
                <div class="home-module-card__metrics light-metrics">
                    <article>
                        <strong th:text="${memoCategoryCount}">0</strong>
                        <span>分类数量</span>
                    </article>
                    <article>
                        <strong th:text="${memoFileCount}">0</strong>
                        <span>文件数量</span>
                    </article>
                    <article>
                        <strong>2</strong>
                        <span>上传方式</span>
                    </article>
                </div>
                <div class="home-module-card__footer">
                    <span class="choice-meta">资料整理</span>
                    <span class="choice-cta">进入</span>
                </div>
            </a>

            <a class="home-module-card home-module-card--secondary module-tone-profile" th:href="@{/user/profile}">
                <div class="home-module-card__head">
                    <span class="section-tag">我的</span>
                    <h3>我的 / 设置</h3>
                </div>
                <div class="home-module-card__profile">
                    <span class="home-module-card__eyebrow">当前账号</span>
                    <strong th:text="${#strings.isEmpty(currentUser.nickname) ? '未设置昵称' : currentUser.nickname}">未设置昵称</strong>
                    <p th:text="|用户名：${currentUser.username}|">用户名</p>
                </div>
                <div class="home-module-card__footer">
                    <span class="choice-meta">账号设置</span>
                    <span class="choice-cta">进入</span>
                </div>
            </a>
        </section>
    </main>
</div>
<div th:replace="~{fragments/mobile-tabbar :: mobileTabbar(activeTab='home')}"></div>
</body>
</html>
