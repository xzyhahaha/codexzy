<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-body">
<div class="auth-card">
    <h1>创建账号</h1>
    <p class="auth-subtitle">先完成注册，再开始记录打卡和管理资料</p>

    <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" th:object="${registerDTO}" method="post" class="form-grid">
        <label>
            <span>用户名</span>
            <input type="text" th:field="*{username}" placeholder="4 到 50 个字符">
            <small class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
        </label>

        <label>
            <span>密码</span>
            <input type="password" th:field="*{password}" placeholder="6 到 32 个字符">
            <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
        </label>

        <label>
            <span>邮箱</span>
            <input type="email" th:field="*{email}" placeholder="name@example.com">
            <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        </label>

        <button type="submit" class="primary-btn">注册</button>
    </form>

    <p class="auth-footer">已有账号？<a th:href="@{/login}">返回登录</a></p>
</div>
</body>
</html>
