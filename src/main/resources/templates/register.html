<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - codexzy</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page register-page">
<div class="auth-layout reverse-auth-layout">
    <section class="auth-story reveal">
        <div class="story-topline">
            <span class="brand-ribbon">codexzy</span>
        </div>
        <h1>从一个账号开始，直接进入记录。</h1>
        <p>注册后就能用经营、打卡和资料。</p>
    </section>

    <section class="auth-panel reveal">
        <div class="auth-panel-header">
            <span class="section-tag">创建账号</span>
            <h2>创建账号</h2>
        </div>

        <div class="flash-stack">
            <div class="flash-banner error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        </div>

        <form th:action="@{/register}" th:object="${registerDTO}" method="post" class="form-stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label>
                <span>用户名</span>
                <input type="text" th:field="*{username}" placeholder="4 到 32 位英文或数字">
                <small class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
            </label>

            <label>
                <span>邮箱</span>
                <input type="email" th:field="*{email}" placeholder="name@example.com">
                <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </label>

            <label>
                <span>密码</span>
                <input type="password" th:field="*{password}" placeholder="至少 6 位">
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </label>

            <button type="submit" class="solid-btn wide-btn">完成注册</button>
        </form>

        <p class="form-footer">已经有账号？<a th:href="@{/login}">返回登录</a></p>
    </section>
</div>
</body>
</html>
